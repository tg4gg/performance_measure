<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Measure Preview</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="Application modes">
          <button type="button" data-mode="pm" class="active">Performance measure</button>
          <button type="button" data-mode="mpm">My performance measure</button>
        </div>
        <h1 id="modeTitle">Performance Measure</h1>
        <p id="modeSubtitle">Pega texto libre, detecta activos, arma grupos ponderados y compara performance.</p>
      </header>

      <section class="panel">
        <h2 id="builderTitle">1) Texto libre / multilinea</h2>
        <p id="builderHint" class="muted section-note"></p>
        <textarea id="rawInput" rows="6"></textarea>
        <div class="row wrap">
          <button id="detectBtn" class="primary">Detectar activos</button>
          <span id="detectInfo" class="muted"></span>
        </div>
        <div id="assetsContainer" class="assets"></div>
      </section>

      <section class="panel">
        <h2 id="collectionTitle">2) Crear grupo compuesto</h2>
        <p id="collectionHint" class="muted section-note"></p>
        <div class="row stack-mobile">
          <input id="groupName" type="text" />
          <button id="saveGroupBtn">Guardar grupo</button>
        </div>
        <div id="subsetBuilder" class="subset-builder hidden">
          <input id="subsetPortfolioInput" list="portfolioSuggestions" type="text" placeholder="Agregar subset existente" />
          <button id="addSubsetBtn" type="button">Agregar subset</button>
          <datalist id="portfolioSuggestions"></datalist>
        </div>
        <div id="groupsContainer" class="groups"></div>
      </section>

      <section class="panel">
        <h2 id="compareTitle">3) Comparacion</h2>
        <p id="compareHint" class="muted section-note"></p>
        <datalist id="compareSuggestions"></datalist>
        <div class="compare-grid">
          <input id="compareField1" list="compareSuggestions" />
          <input id="compareField2" list="compareSuggestions" />
          <input id="compareField3" list="compareSuggestions" />
          <input id="compareField4" list="compareSuggestions" />
        </div>
        <div class="row wrap">
          <button id="runCompareBtn" class="primary">Comparar seleccion</button>
          <button id="clearCompareBtn">Limpiar seleccion</button>
        </div>
        <div id="compareWarning" class="compare-warning" aria-live="polite"></div>

        <div class="range-buttons" id="rangeButtons">
          <button type="button" data-range="ytd" class="active">Year to date</button>
          <button type="button" data-range="1y">One year</button>
          <button type="button" data-range="3y">Three years</button>
          <button type="button" data-range="5y">Five years</button>
          <button type="button" data-range="10y">Ten years</button>
        </div>

        <div id="chartLegend" class="chart-legend"></div>

        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>

        <div class="table-wrap">
          <table id="perfTable" class="perf-table">
            <thead>
              <tr>
                <th id="perfHeadLabel">Seleccion</th>
                <th id="perfHeadYtd">YTD</th>
                <th id="perfHead1y">1Y</th>
                <th id="perfHead3y">3Y</th>
              </tr>
            </thead>
            <tbody id="perfTableBody"></tbody>
          </table>
        </div>

        <div class="table-wrap">
          <table id="yoyTable" class="perf-table">
            <thead>
              <tr>
                <th id="yoyTitle">YoY</th>
                <th>Retorno</th>
              </tr>
            </thead>
            <tbody id="yoyTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
